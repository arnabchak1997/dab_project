# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 5c86fbc1-1267-4c6a-a6f4-25dfbcfefd8a

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: "citibike_dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405616450018121.1.azuredatabricks.net
    variables:
      catalog: citibike_dev
    presets:
      artifacts_dynamic_version: true

  test:
    mode: production
    workspace:
      host: https://adb-7405608415883903.3.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/arnabsmi@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_test"
      dev_flag: false
    permissions:
      - service_principal_name: 31a7087d-b115-47e0-ac61-d20a87fd9962
        level: CAN_MANAGE
    run_as:
      service_principal_name: 31a7087d-b115-47e0-ac61-d20a87fd9962

  prod:
    mode: production
    workspace:
      host: https://adb-7405605691758347.7.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/arnabsmi@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_prod"
      dev_flag: false
    permissions:
      - service_principal_name: ecd322e1-68d4-4b3e-91f8-b08cfb6b6227
        level: CAN_MANAGE
    run_as:
      service_principal_name: ecd322e1-68d4-4b3e-91f8-b08cfb6b6227